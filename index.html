<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP 查詢工具</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: white;
      width: 90%;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    #ip {
      font-size: 36px;
      font-weight: bold;
      color: #0077ff;
      margin: 20px 0;
      word-break: break-all;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #0077ff;
      color: white;
    }

    .small {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>你的目前 IP</h1>

    <div id="ip">讀取中...</div>

    <button onclick="getIP()">重新查詢</button>

    <div class="small">
      Powered by FoundLive Pages
    </div>
  </div>

  <script>
    async function getIP() {
      const ipBox = document.getElementById("ip");
      ipBox.textContent = "讀取中...";

      try {
        const response = await fetch("https://api.ipify.org?format=json");
        const data = await response.json();
        ipBox.textContent = data.ip;
      } catch (error) {
        ipBox.textContent = "查詢失敗";
        console.error(error);
      }
    }

    getIP();
  </script>

</body>
</html>
